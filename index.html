<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        h2 {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 4px;
            color: #000;
        }

        .subtitle {
            font-size: 13px;
            color: #666;
            margin-bottom: 24px;
        }

        .message {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        #error-msg {
            background: #fcebeb;
            border: 1px solid #f09595;
            color: #a32d2d;
        }

        #success-msg {
            background: #eaf3de;
            border: 1px solid #97c459;
            color: #3b6d11;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d3d1c7;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input[type="text"]:hover,
        input[type="password"]:hover {
            border-color: #b4b2a9;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #185fa5;
            box-shadow: 0 0 0 3px rgba(24, 95, 165, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            color: #666;
        }

        button {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #d3d1c7;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #f5f5f5;
            border-color: #b4b2a9;
        }

        button:active {
            transform: scale(0.98);
        }

        .hint {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 16px;
        }

        code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Sign in</h2>
        <p class="subtitle">Form for testing my scripts</p>

        <div id="error-msg" class="message"></div>
        <div id="success-msg" class="message"></div>

        <div class="form-group">
            <label for="username">Username</label>
            <input id="username" type="text" placeholder="Enter username">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter password">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="remember">
            <label for="remember">Remember me</label>
        </div>

        <button id="login-btn" onclick="handleLogin()">Sign in</button>

        <p class="hint">Use <code>admin</code> / <code>password123</code> to log in</p>
    </div>

    <script>
        function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (!username || !password) {
                errorMsg.textContent = 'Please fill in all fields.';
                errorMsg.style.display = 'block';
                return;
            }

            if (username === 'admin' && password === 'password123') {
                successMsg.textContent = 'Login successful! Welcome back.';
                successMsg.style.display = 'block';
            } else {
                errorMsg.textContent = 'Invalid username or password.';
                errorMsg.style.display = 'block';
            }
        }

        document.getElementById('password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>
</html>
