<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .login-box {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .login-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .form-container {
            padding: 30px 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input[type="text"]:focus,
        .form-group input[type="email"]:focus,
        .form-group input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group.checkbox {
            display: flex;
            align-items: center;
        }

        .form-group.checkbox input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .form-group.checkbox label {
            margin: 0;
            cursor: pointer;
            font-weight: 400;
        }

        .form-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            id: "login-btn";
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-register {
            background: #f0f0f0;
            color: #333;
            id: "register-btn";
        }

        .btn-register:hover {
            background: #e0e0e0;
        }

        .message-container {
            margin-bottom: 20px;
            min-height: 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .message {
            padding: 12px;
            border-radius: 5px;
            font-size: 14px;
            display: none;
        }

        .message.show {
            display: block;
        }

        #error-msg {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        #success-msg {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 10px;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toggle-form {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }

        .toggle-form a {
            color: #667eea;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }

        .toggle-form a:hover {
            text-decoration: underline;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .token-display {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
            display: none;
        }

        .token-display.show {
            display: block;
        }

        .token-display h3 {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .token-value {
            background: white;
            padding: 10px;
            border-radius: 3px;
            font-size: 11px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            color: #333;
            max-height: 150px;
            overflow-y: auto;
        }

        .copy-token-btn {
            margin-top: 10px;
            width: 100%;
            padding: 8px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }

        .copy-token-btn:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="login-header">
                <h1>Welcome</h1>
                <p>Test Login System</p>
            </div>

            <div class="form-container">
                <!-- Messages -->
                <div class="message-container">
                    <div id="error-msg" class="message"></div>
                    <div id="success-msg" class="message"></div>
                </div>

                <!-- Login Form -->
                <form class="form active" id="login-form">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" placeholder="Enter your username" required>
                    </div>

                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required>
                    </div>

                    <div class="form-group checkbox">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" class="btn-login" id="login-btn">Sign in</button>
                        <button type="button" class="btn-register" onclick="toggleForms()">Register</button>
                    </div>

                    <div class="toggle-form">
                        Don't have an account? <a onclick="toggleForms()">Sign up</a>
                    </div>
                </form>

                <!-- Register Form -->
                <form class="form" id="register-form">
                    <div class="form-group">
                        <label for="register-username">Username</label>
                        <input type="text" id="register-username" placeholder="Choose a username" required>
                    </div>

                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="register-password">Password</label>
                        <input type="password" id="register-password" placeholder="Create a password (min 6 chars)" required>
                    </div>

                    <div class="form-group">
                        <label for="register-confirm">Confirm Password</label>
                        <input type="password" id="register-confirm" placeholder="Confirm your password" required>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" class="btn-login" id="register-btn">Create Account</button>
                        <button type="button" class="btn-register" onclick="toggleForms()">Back to Login</button>
                    </div>

                    <div class="toggle-form">
                        Already have an account? <a onclick="toggleForms()">Sign in</a>
                    </div>
                </form>

                <!-- Loading Indicator -->
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <span>Processing...</span>
                </div>

                <!-- Token Display -->
                <div class="token-display" id="token-display">
                    <h3>Access Token (JWT)</h3>
                    <div class="token-value" id="token-value"></div>
                    <button type="button" class="copy-token-btn" onclick="copyToken()">Copy Token</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "http://localhost:5000/api";

        // Message helper functions
        function showError(message) {
            const errorMsg = document.getElementById("error-msg");
            const successMsg = document.getElementById("success-msg");
            errorMsg.textContent = message;
            errorMsg.classList.add("show");
            successMsg.classList.remove("show");
            setTimeout(() => errorMsg.classList.remove("show"), 5000);
        }

        function showSuccess(message) {
            const errorMsg = document.getElementById("error-msg");
            const successMsg = document.getElementById("success-msg");
            successMsg.textContent = message;
            successMsg.classList.add("show");
            errorMsg.classList.remove("show");
            setTimeout(() => successMsg.classList.remove("show"), 5000);
        }

        function showLoading(show) {
            document.getElementById("loading").style.display = show ? "block" : "none";
        }

        function toggleForms() {
            const loginForm = document.getElementById("login-form");
            const registerForm = document.getElementById("register-form");
            loginForm.classList.toggle("active");
            registerForm.classList.toggle("active");
            clearMessages();
        }

        function clearMessages() {
            document.getElementById("error-msg").classList.remove("show");
            document.getElementById("success-msg").classList.remove("show");
        }

        // Display token
        function displayToken(token) {
            const tokenDisplay = document.getElementById("token-display");
            const tokenValue = document.getElementById("token-value");
            tokenValue.textContent = token;
            tokenDisplay.classList.add("show");
        }

        function copyToken() {
            const tokenValue = document.getElementById("token-value");
            navigator.clipboard.writeText(tokenValue.textContent)
                .then(() => showSuccess("Token copied to clipboard!"))
                .catch(() => showError("Failed to copy token"));
        }

        // Login handler
        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            showLoading(true);

            const username = document.getElementById("login-username").value;
            const password = document.getElementById("login-password").value;
            const remember = document.getElementById("remember").checked;

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess(data.message);
                    displayToken(data.token);
                    
                    // Store token if remember me is checked
                    if (remember) {
                        localStorage.setItem("token", data.token);
                        localStorage.setItem("username", username);
                    }
                    
                    // Clear form
                    document.getElementById("login-form").reset();
                } else {
                    showError(data.message || "Login failed");
                }
            } catch (error) {
                showError("Connection error: " + error.message);
            } finally {
                showLoading(false);
            }
        });

        // Register handler
        document.getElementById("register-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            showLoading(true);

            const username = document.getElementById("register-username").value;
            const email = document.getElementById("register-email").value;
            const password = document.getElementById("register-password").value;
            const confirmPassword = document.getElementById("register-confirm").value;

            // Validate passwords match
            if (password !== confirmPassword) {
                showError("Passwords do not match");
                showLoading(false);
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/register`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess(data.message);
                    document.getElementById("register-form").reset();
                    setTimeout(() => toggleForms(), 2000);
                } else {
                    showError(data.message || "Registration failed");
                }
            } catch (error) {
                showError("Connection error: " + error.message);
            } finally {
                showLoading(false);
            }
        });

        // Check for stored credentials on page load
        window.addEventListener("load", () => {
            const storedToken = localStorage.getItem("token");
            const storedUsername = localStorage.getItem("username");
            
            if (storedToken && storedUsername) {
                document.getElementById("login-username").value = storedUsername;
                displayToken(storedToken);
            }
        });
    </script>
</body>
</html>
